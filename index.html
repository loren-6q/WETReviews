<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WET! Response Engine</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .wet-gradient { background: linear-gradient(135deg, #ff0080 0%, #7928ca 100%); }
        .neon-border { box-shadow: 0 0 10px rgba(255, 0, 128, 0.5), 0 0 20px rgba(255, 0, 128, 0.3); }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); }
        .tab-active { border-bottom: 3px solid #ff0080; color: white; font-weight: 900; }
        
        #sync-overlay {
            display: flex;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.95);
            z-index: 100;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            transition: opacity 0.5s ease;
        }
        .sync-hidden { opacity: 0; pointer-events: none; display: none !important; }
    </style>
</head>
<body class="bg-gray-950 text-white min-h-screen pb-20">

    <!-- Syncing Overlay -->
    <div id="sync-overlay">
        <div class="w-12 h-12 border-4 border-pink-500 border-t-transparent rounded-full animate-spin mb-4"></div>
        <p id="sync-status" class="text-xs font-black uppercase tracking-widest text-pink-500 text-center px-4 italic">Syncing WET! Cloud Data...</p>
        <button id="skip-sync" onclick="window.hideOverlay()" class="mt-6 text-[10px] text-gray-500 underline uppercase tracking-widest px-6 py-2 border border-gray-700 rounded-full hover:bg-white/5 transition-all text-nowrap">Use Offline Mode</button>
    </div>

    <div class="max-w-xl mx-auto px-4 py-8">
        <!-- Header -->
        <header class="mb-6 text-center">
            <div class="inline-block p-1 rounded-full wet-gradient mb-4 neon-border">
                <div class="bg-gray-900 rounded-full px-6 py-2">
                    <h1 class="text-3xl font-black tracking-tighter italic uppercase text-nowrap">WET! <span class="text-pink-500 text-2xl text-nowrap">Response Hub</span></h1>
                </div>
            </div>
            
            <nav class="flex justify-center space-x-8 mt-4 border-b border-white/10">
                <button onclick="switchTab('generator')" id="tab-gen" class="pb-2 text-xs uppercase tracking-widest text-gray-500 tab-active transition-all">Generator</button>
                <button onclick="switchTab('settings')" id="tab-set" class="pb-2 text-xs uppercase tracking-widest text-gray-500 transition-all text-nowrap">Edit Engine Details</button>
            </nav>
        </header>

        <!-- GENERATOR TAB -->
        <main id="view-generator" class="space-y-4">
            <section class="glass border border-white/10 p-5 rounded-[2rem] shadow-xl">
                <label class="block text-[10px] font-black uppercase text-pink-500 mb-2 tracking-widest">Public Guest Review</label>
                <textarea id="reviewInput" rows="4" 
                    class="w-full bg-gray-900/50 border border-gray-800 rounded-2xl p-4 text-white placeholder-gray-600 focus:border-pink-500 focus:ring-1 focus:ring-pink-500 outline-none transition-all text-sm"
                    placeholder="Paste the guest's review here..."></textarea>
            </section>

            <section class="glass border border-white/10 p-5 rounded-[2rem] shadow-xl bg-yellow-500/5">
                <label class="block text-[10px] font-black uppercase text-yellow-500 mb-2 tracking-widest">Manager Notes (Internal Context)</label>
                <textarea id="internalNotes" rows="2" 
                    class="w-full bg-gray-900/50 border border-gray-800 rounded-2xl p-4 text-white placeholder-gray-600 focus:border-yellow-500 focus:ring-1 focus:ring-yellow-500 outline-none transition-all text-sm"
                    placeholder="e.g. This was a fake review/no-show..."></textarea>
            </section>

            <section class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div class="glass border border-white/10 p-4 rounded-3xl">
                    <label class="block text-[10px] font-black uppercase text-purple-400 mb-2 tracking-widest">Extra Tags</label>
                    <input id="extraKeywords" type="text" 
                        class="w-full bg-gray-900/50 border border-gray-800 rounded-xl p-3 text-sm outline-none focus:border-purple-400"
                        placeholder="e.g. Foam Party, Staff name">
                </div>
                <div class="glass border border-white/10 p-4 rounded-3xl">
                    <label class="block text-[10px] font-black uppercase text-blue-400 mb-2 tracking-widest">Rebuttal Type</label>
                    <select id="issueType" class="w-full bg-gray-900/50 border border-gray-800 rounded-xl p-3 text-sm outline-none focus:border-blue-400 appearance-none cursor-pointer">
                        <option value="general">Standard Positive</option>
                        <option value="noshow">No-Show / Refund Revenge</option>
                        <option value="cleanliness">Cleanliness / Party Mess</option>
                        <option value="maintenance">Maintenance Issue</option>
                        <option value="noise">Noise / Music Volume</option>
                        <option value="power_water">Power or Water Issue</option>
                    </select>
                </div>
            </section>

            <button id="generateBtn" onclick="handleGeneration()" 
                class="w-full wet-gradient hover:brightness-110 active:scale-95 text-white font-black py-5 rounded-3xl shadow-2xl transition-all flex items-center justify-center gap-3">
                <span id="btnText">GENERATE RESPONSE</span>
                <div id="loader" class="hidden w-5 h-5 border-2 border-white/30 border-t-white rounded-full animate-spin"></div>
            </button>

            <section id="resultArea" class="hidden space-y-4">
                <div class="relative group">
                    <div class="absolute -inset-0.5 bg-gradient-to-r from-pink-500 to-yellow-500 rounded-3xl blur opacity-20 group-hover:opacity-40 transition duration-1000"></div>
                    <div class="relative glass border border-white/10 p-6 rounded-3xl">
                        <div class="flex justify-between items-center mb-4">
                            <h3 class="text-[10px] font-black uppercase text-green-400 tracking-widest">Drafted Response</h3>
                            <button onclick="copyResponse()" class="text-[9px] bg-white/10 hover:bg-white/20 px-3 py-1 rounded-full uppercase font-bold transition-colors">Copy</button>
                        </div>
                        <p id="generatedText" class="text-md leading-relaxed font-medium text-gray-200 italic">
                            Response will appear here...
                        </p>
                    </div>
                </div>
            </section>
        </main>

        <!-- SETTINGS TAB -->
        <main id="view-settings" class="hidden space-y-4">
            <section class="glass border border-white/10 p-6 rounded-[2rem] shadow-xl space-y-6">
                
                <div class="bg-pink-500/10 border border-pink-500/30 p-4 rounded-2xl mb-4">
                    <div class="flex items-center justify-between mb-2">
                        <h3 class="text-pink-500 font-black uppercase text-[10px] tracking-widest">SEO Trend Researcher</h3>
                        <span class="text-[8px] bg-pink-500 text-white px-2 py-0.5 rounded-full font-bold uppercase tracking-widest">Live Search</span>
                    </div>
                    <p class="text-[11px] text-gray-400 mb-3">Find what Full Moon Party travelers are searching for right now.</p>
                    <button id="researchBtn" onclick="researchKeywords()" class="w-full bg-pink-600 hover:bg-pink-500 text-white text-[10px] font-black py-2 rounded-lg transition-all">
                        RESEARCH TRENDING KEYWORDS 🔍
                    </button>
                    <div id="researchResultsContainer" class="hidden mt-3 p-3 bg-black/40 rounded-xl border-l-2 border-pink-500">
                        <div id="researchResults" class="text-[11px] text-pink-100 italic mb-2 leading-relaxed"></div>
                        <button id="applyKeywordsBtn" onclick="applyResearchedKeywords()" class="hidden text-[10px] bg-white/20 hover:bg-white/30 text-white px-3 py-1 rounded-full font-bold transition-all uppercase">Apply to SEO Keywords</button>
                    </div>
                </div>

                <div>
                    <h2 class="text-pink-500 font-black uppercase text-xs mb-4 tracking-widest">Global SEO Keywords</h2>
                    <textarea id="kb-keywords" rows="3" 
                        class="w-full bg-gray-900 border border-gray-800 rounded-2xl p-4 text-white text-sm outline-none focus:border-pink-500"
                        placeholder="Comma separated keywords..."></textarea>
                </div>

                <div>
                    <h2 class="text-yellow-500 font-black uppercase text-xs mb-4 tracking-widest text-nowrap">Hostel Knowledge Base</h2>
                    <textarea id="kb-details" rows="8" 
                        class="w-full bg-gray-900 border border-gray-800 rounded-2xl p-4 text-white text-sm outline-none focus:border-yellow-500"
                        placeholder="Policies, staff info, and 24h cleaning details..."></textarea>
                </div>

                <button id="saveBtn" onclick="saveSettings()" class="w-full bg-green-600 hover:bg-green-500 text-white font-black py-4 rounded-2xl shadow-xl transition-all">
                    UPDATE CLOUD DATA ✅
                </button>
            </section>
        </main>

        <footer class="mt-8 text-center text-gray-700 text-[9px] uppercase tracking-widest font-bold">
            WET! • Cloud Connected Hub
        </footer>
    </div>

    <!-- Toast Message -->
    <div id="toast" class="hidden fixed bottom-10 left-1/2 -translate-x-1/2 bg-white text-black font-black px-8 py-4 rounded-full shadow-2xl z-50 uppercase tracking-tighter">
        COPIED!
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // ========================================================
        // 🛠️ HARDCODED SECRETS - PASTE YOUR GEMINI KEY HERE
        // ========================================================
        
        const MY_GEMINI_API_KEY = "PASTE_YOUR_API_KEY_HERE"; 

        const MY_FIREBASE_CONFIG = {
            apiKey: "AIzaSyDYBzx9lApoIbYq4GoCLdX4mhSIPt8keSA",
            authDomain: "wetreviews1.firebaseapp.com",
            projectId: "wetreviews1",
            storageBucket: "wetreviews1.firebasestorage.app",
            messagingSenderId: "311792614972",
            appId: "1:311792614972:web:9e36b05fdacd4698138d39"
        };
        const MY_HOSTEL_ID = "wetreviews1-main";
        // ========================================================

        const hostelId = MY_HOSTEL_ID;
        const firebaseConfig = MY_FIREBASE_CONFIG;
        const defaultData = {
            keywords: "Full Moon Party, WET!, WET Pool Party, most social, Koh Phangan, Wild & Wandering",
            details: "WET! is a 24-hour pool party hostel. Large pool with garden, swim up bar, games, beer pong, DJs. Pre-party hub for Jungle Experience, Waterfall Party, and OXA Party. 24h staff, housekeeping, and maintenance. Guest Group Chat available for reporting issues. Housekeeping cleans twice daily."
        };

        window.currentSettings = defaultData;

        window.hideOverlay = () => {
            const overlay = document.getElementById('sync-overlay');
            if (overlay) overlay.classList.add('sync-hidden');
        };

        const loadLocalData = () => {
            const saved = localStorage.getItem('wet_local_settings');
            if (saved) {
                window.currentSettings = JSON.parse(saved);
                document.getElementById('kb-keywords').value = window.currentSettings.keywords || "";
                document.getElementById('kb-details').value = window.currentSettings.details || "";
            } else {
                document.getElementById('kb-keywords').value = defaultData.keywords;
                document.getElementById('kb-details').value = defaultData.details;
            }
        };

        loadLocalData();

        async function executeGeminiRequest(payload, retries = 5) {
            if (!MY_GEMINI_API_KEY || MY_GEMINI_API_KEY === "PASTE_YOUR_API_KEY_HERE") {
                throw new Error("API Key placeholder detected. Please paste your actual key in the code.");
            }

            // Switched to 'gemini-1.5-flash' which is the widely available standard stable model
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${MY_GEMINI_API_KEY}`;
            let delay = 1000;

            for (let i = 0; i < retries; i++) {
                try {
                    const response = await fetch(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });
                    
                    const result = await response.json();

                    if (!response.ok) {
                        const errorMsg = result.error?.message || `HTTP Error ${response.status}`;
                        throw new Error(errorMsg);
                    }

                    if (!result.candidates || result.candidates.length === 0) {
                        throw new Error("No response generated. The review might have triggered a safety filter.");
                    }

                    return result.candidates[0].content.parts[0].text;
                } catch (error) {
                    if (i === retries - 1 || error.message.includes("API Key") || error.message.includes("403")) {
                        throw error;
                    }
                    await new Promise(res => setTimeout(res, delay));
                    delay *= 2;
                }
            }
        }

        const init = async () => {
            try {
                const app = initializeApp(firebaseConfig);
                const auth = getAuth(app);
                const db = getFirestore(app);
                await signInAnonymously(auth);

                onAuthStateChanged(auth, (user) => {
                    if (!user) return;
                    const settingsDocRef = doc(db, 'artifacts', hostelId, 'public', 'data', 'settings', 'global');
                    onSnapshot(settingsDocRef, (docSnap) => {
                        if (docSnap.exists()) {
                            window.currentSettings = docSnap.data();
                            document.getElementById('kb-keywords').value = window.currentSettings.keywords || "";
                            document.getElementById('kb-details').value = window.currentSettings.details || "";
                            localStorage.setItem('wet_local_settings', JSON.stringify(window.currentSettings));
                        } else {
                            setDoc(settingsDocRef, defaultData);
                        }
                        window.hideOverlay();
                    }, (err) => {
                        console.error("Cloud Access Issue - Check Firestore Rules");
                        window.hideOverlay();
                    });
                });
            } catch (err) {
                console.error("Cloud Connection Failed");
                window.hideOverlay();
            }
        };

        window.saveSettings = async () => {
            const data = {
                keywords: document.getElementById('kb-keywords').value,
                details: document.getElementById('kb-details').value,
                lastUpdated: Date.now()
            };
            localStorage.setItem('wet_local_settings', JSON.stringify(data));
            window.currentSettings = data;
            try {
                const app = initializeApp(firebaseConfig);
                const db = getFirestore(app);
                const settingsDocRef = doc(db, 'artifacts', hostelId, 'public', 'data', 'settings', 'global');
                await setDoc(settingsDocRef, data);
                window.showToast("CLOUD UPDATED! ✅");
            } catch (e) {
                window.showToast("SAVED LOCALLY 💾");
            }
            window.switchTab('generator');
        };

        window.researchKeywords = async () => {
            const resultsBox = document.getElementById('researchResults');
            const btn = document.getElementById('researchBtn');
            const applyBtn = document.getElementById('applyKeywordsBtn');
            const originalText = btn.innerText;

            btn.innerText = "SCRAPING TRENDS...";
            btn.disabled = true;
            document.getElementById('researchResultsContainer').classList.remove('hidden');
            resultsBox.innerText = "Querying Phangan party trends...";

            const prompt = "Research current traveler trends for 'Full Moon Party 2026' and Koh Phangan hostels. Provide ONLY a comma-separated list of 12 SEO keywords. No intro.";

            try {
                const text = await executeGeminiRequest({
                    contents: [{ parts: [{ text: prompt }] }],
                    // tools: [{ "google_search": {} }] // Removed tools to ensure base model compatibility for research
                });
                resultsBox.innerText = text || "No trends found.";
                applyBtn.classList.remove('hidden');
            } catch (e) {
                resultsBox.innerText = "Research error: " + e.message;
            } finally {
                btn.innerText = "RESEARCH TRENDING KEYWORDS 🔍";
                btn.disabled = false;
            }
        };

        window.applyResearchedKeywords = () => {
            const keywordsInput = document.getElementById('kb-keywords');
            const newKeys = document.getElementById('researchResults').innerText;
            keywordsInput.value = keywordsInput.value ? keywordsInput.value + ", " + newKeys : newKeys;
            window.showToast("KEYWORDS ADDED! ✨");
        };

        window.handleGeneration = async () => {
            const reviewText = document.getElementById('reviewInput').value;
            const internalNotes = document.getElementById('internalNotes').value;
            const extraKeywords = document.getElementById('extraKeywords').value;
            const issueType = document.getElementById('issueType').value;
            const btnText = document.getElementById('btnText');
            const loader = document.getElementById('loader');
            const resultArea = document.getElementById('resultArea');
            const generatedText = document.getElementById('generatedText');

            if (!reviewText) {
                window.showToast("Paste a review first!", "bg-red-500 text-white");
                return;
            }

            btnText.innerText = "WRITING...";
            loader.classList.remove('hidden');
            resultArea.classList.remove('hidden');
            generatedText.innerText = "Drafting with policy context...";

            const kb = window.currentSettings;
            const systemPrompt = `Manager of WET! Pool Party Hostel. Policy: ${kb.details}. Keywords: ${kb.keywords}. Style: Professional/Clear. Rebuttal: Apologize first, explain clearly. Notes: ${internalNotes} (${issueType}). Constraint: 2-3 sentences.`;

            try {
                const text = await executeGeminiRequest({
                    contents: [{ parts: [{ text: reviewText }] }],
                    systemInstruction: { parts: [{ text: systemPrompt }] }
                });
                generatedText.innerText = text || "Error drafting.";
            } catch (error) {
                generatedText.innerText = "Error: " + error.message;
            } finally {
                btnText.innerText = "GENERATE RESPONSE";
                loader.classList.add('hidden');
            }
        };

        init();
    </script>

    <script>
        function switchTab(tab) {
            const genView = document.getElementById('view-generator');
            const setView = document.getElementById('view-settings');
            const genTab = document.getElementById('tab-gen');
            const setTab = document.getElementById('tab-set');
            if (tab === 'generator') {
                genView.classList.remove('hidden'); setView.classList.add('hidden');
                genTab.classList.add('tab-active'); setTab.classList.remove('tab-active');
            } else {
                genView.classList.add('hidden'); setView.classList.remove('hidden');
                genTab.classList.remove('tab-active'); setTab.classList.add('tab-active');
            }
        }
        function copyResponse() {
            const text = document.getElementById('generatedText').innerText;
            const temp = document.createElement('textarea'); temp.value = text;
            document.body.appendChild(temp); temp.select(); document.execCommand('copy');
            document.body.removeChild(temp); window.showToast("COPIED!");
        }
        function showToast(message, colorClass = "bg-white text-black") {
            const toast = document.getElementById('toast');
            if (toast) {
                toast.innerText = message;
                toast.className = `fixed bottom-10 left-1/2 -translate-x-1/2 font-black px-8 py-4 rounded-full shadow-2xl z-50 uppercase tracking-tighter ${colorClass}`;
                toast.classList.remove('hidden');
                setTimeout(() => toast.classList.add('hidden'), 2000);
            }
        }
        window.showToast = showToast; window.switchTab = switchTab;
    </script>
    <script src="https://loren-6q.github.io/WETNav/nav.js"></script>
</body>
</html>
